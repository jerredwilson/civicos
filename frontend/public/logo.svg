<svg width="64" height="83" viewBox="0 0 40 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Flag pole -->
  <line x1="20" y1="2" x2="20" y2="8" stroke="#2563eb" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Flag -->
  <polygon points="20,2 26,4.5 20,7" fill="#2563eb" opacity="0.8"/>
  <!-- Dome -->
  <ellipse cx="20" cy="10" rx="7" ry="4" fill="#2563eb"/>
  <ellipse cx="20" cy="9" rx="6" ry="2.5" fill="#2563eb" opacity="0.6"/>
  <!-- Pediment -->
  <polygon points="4,22 20,12 36,22" fill="#2563eb"/>
  <!-- Building body -->
  <rect x="5" y="22" width="30" height="20" rx="0.5" fill="#2563eb"/>
  <!-- Columns -->
  <rect x="7"  y="23" width="3" height="18" rx="1" fill="white" opacity="0.25"/>
  <rect x="13" y="23" width="3" height="18" rx="1" fill="white" opacity="0.25"/>
  <rect x="19" y="23" width="2" height="18" rx="1" fill="white" opacity="0.25"/>
  <rect x="24" y="23" width="3" height="18" rx="1" fill="white" opacity="0.25"/>
  <rect x="30" y="23" width="3" height="18" rx="1" fill="white" opacity="0.25"/>
  <!-- Door -->
  <rect x="17" y="34" width="6" height="8" rx="1" fill="white" opacity="0.35"/>
  <!-- Steps -->
  <rect x="3"  y="42" width="34" height="3"  rx="0.5" fill="#2563eb" opacity="0.85"/>
  <rect x="1"  y="45" width="38" height="3"  rx="0.5" fill="#2563eb" opacity="0.7"/>
  <rect x="0"  y="48" width="40" height="4"  rx="0.5" fill="#2563eb" opacity="0.55"/>
</svg>
