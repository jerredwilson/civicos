<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Blue background (fills entire square for maskable icon support) -->
  <rect width="512" height="512" fill="#1e3a8a"/>
  <!-- City hall logo, scaled to ~70% of icon height, centered within safe zone -->
  <!-- Original viewBox 0 0 40 52; scale=6.89, translate(118,77) -->
  <g transform="translate(118, 77) scale(6.89)">
    <!-- Flag pole -->
    <line x1="20" y1="2" x2="20" y2="8" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Flag -->
    <polygon points="20,2 26,4.5 20,7" fill="white" opacity="0.9"/>
    <!-- Dome -->
    <ellipse cx="20" cy="10" rx="7" ry="4" fill="white"/>
    <ellipse cx="20" cy="9" rx="6" ry="2.5" fill="white" opacity="0.7"/>
    <!-- Pediment -->
    <polygon points="4,22 20,12 36,22" fill="white"/>
    <!-- Building body -->
    <rect x="5" y="22" width="30" height="20" rx="0.5" fill="white"/>
    <!-- Columns -->
    <rect x="7"  y="23" width="3" height="18" rx="1" fill="#1e3a8a" opacity="0.3"/>
    <rect x="13" y="23" width="3" height="18" rx="1" fill="#1e3a8a" opacity="0.3"/>
    <rect x="19" y="23" width="2" height="18" rx="1" fill="#1e3a8a" opacity="0.3"/>
    <rect x="24" y="23" width="3" height="18" rx="1" fill="#1e3a8a" opacity="0.3"/>
    <rect x="30" y="23" width="3" height="18" rx="1" fill="#1e3a8a" opacity="0.3"/>
    <!-- Door -->
    <rect x="17" y="34" width="6" height="8" rx="1" fill="#1e3a8a" opacity="0.45"/>
    <!-- Windows -->
    <rect x="8"  y="26" width="4" height="3" rx="0.5" fill="#1e3a8a" opacity="0.2"/>
    <rect x="28" y="26" width="4" height="3" rx="0.5" fill="#1e3a8a" opacity="0.2"/>
    <rect x="8"  y="31" width="4" height="3" rx="0.5" fill="#1e3a8a" opacity="0.2"/>
    <rect x="28" y="31" width="4" height="3" rx="0.5" fill="#1e3a8a" opacity="0.2"/>
    <!-- Steps -->
    <rect x="3"  y="42" width="34" height="3"  rx="0.5" fill="white" opacity="0.85"/>
    <rect x="1"  y="45" width="38" height="3"  rx="0.5" fill="white" opacity="0.7"/>
    <rect x="0"  y="48" width="40" height="4"  rx="0.5" fill="white" opacity="0.55"/>
  </g>
</svg>
